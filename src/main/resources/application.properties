spring.application.name=Challenge_ForoHub

spring.datasource.url=jdbc:mysql://${BD_HOST}/${BD_NAME}
spring.datasource.username=${BD_USERNAME}
spring.datasource.password=${BD_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

jwt.secret=${BD_JWT_SECRET:123456789123456789123456789}
jwt.expiration=2

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration